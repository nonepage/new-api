services:
  mysql:
    image: mysql:8.2
    container_name: new-api-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: new-api
      TZ: Asia/Shanghai
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -p123456 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - new-api-network

  redis:
    image: redis:latest
    container_name: new-api-redis
    restart: always
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - new-api-network

  new-api:
    build: .
    image: new-api:local
    container_name: new-api
    restart: unless-stopped
    command: ['--log-dir', '/app/logs']
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SQL_DSN: root:123456@tcp(mysql:3306)/new-api
      REDIS_CONN_STRING: redis://redis:6379
      GROUP_QR_CODE_URL: https://doc.xcode.best/qq.jpg
      TZ: Asia/Shanghai
      SYNC_FREQUENCY: 60
      ERROR_LOG_ENABLED: 'true'
    ports:
      - '3000:3000'
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:3000/api/status >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - new-api-network

volumes:
  mysql_data:

networks:
  new-api-network:
    driver: bridge
